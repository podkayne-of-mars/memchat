{% extends "base.html" %}

{% block title %}Chat — Memchat{% endblock %}

{% block content %}
<div id="top-bar">
    <span>Chatting as <strong>{{ user.display_name }}</strong></span>
    <nav>
        <a href="/settings">Settings</a>
        <a href="/debug">Debug</a>
        <a href="/logout">Switch User</a>
    </nav>
</div>
<div id="chat-container">
    <div id="messages"></div>
    <div id="image-preview" style="display:none;">
        <img id="preview-img" src="" alt="Preview" />
        <button type="button" id="remove-image" title="Remove image">&times;</button>
    </div>
    <form id="chat-form">
        <input type="file" id="image-file-input" accept="image/*" style="display:none;" />
        <button type="button" id="attach-btn" title="Attach image">&#128247;</button>
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
        <button type="submit">Send</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
